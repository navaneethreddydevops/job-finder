services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_PATH=/data/jobs.db
    volumes:
      - jobs-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "3000:80"
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jobs-data:
