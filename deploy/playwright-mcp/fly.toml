# Fly.io config for the Playwright MCP sidecar.
# Deploy:  cd deploy/playwright-mcp && fly launch --copy-config --no-deploy && \
#          fly secrets set PLAYWRIGHT_MCP_TOKEN=$(openssl rand -hex 32) && fly deploy
# Then set on FastAPI Cloud (Project Settings → Secrets):
#   PLAYWRIGHT_MCP_URL   = https://<app>.fly.dev
#   PLAYWRIGHT_MCP_TOKEN = <same token>
app = "job-finder-playwright-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine alive: MCP sessions are stateful (a live browser context),
  # so auto-stop mid-apply would kill in-flight runs.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
